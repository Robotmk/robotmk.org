# ── Solution ──────────────────────────────────────────────────────────────────
solution:
  eyebrow: "Die Lösung"
  heading: "Von Robot Framework zu Checkmk — nahtlos."
  flow_aria: "Flow: Robot Framework → Robotmk → Checkmk Synthetic Monitoring"
  card1:
    label: "Für Checkmk-Nutzer"
