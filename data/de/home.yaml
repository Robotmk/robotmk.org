      label: "von 10 IT-Ausfällen: menschengemacht."
    - number: "2.5×"
      label: "Kostensteigerung von 2014–2024 (Gartner/EMA)"
    - number: "$14,000"
      label: "Durchschnittliche Kosten einer Minute IT Ausfall (2026)"

