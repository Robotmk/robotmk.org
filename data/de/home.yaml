  description: "Klassisches Monitoring überwacht das, was selten ausfällt: die Hardware.<br>Unbemerkt bleibt, was deine User tatsächlich erleben – einen scheiternden Login, eine langsam ladende Seite, einen Checkout, der hängt etc.<br><b>Fatal: Nutzerzufriedenheit und Umsatz entstehen dort, wo Monitoring-Systeme blind sind - auf der Applikationsebene.</b>"
  items:
