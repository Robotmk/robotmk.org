# ── Founder ───────────────────────────────────────────────────────────────────
founder:
  heading: "Erfunden. Perfektioniert. Nativ in Checkmk."
  bio: "Ich bin <b>Simon Meggle</b>, der Gründer des Robotmk-Projektes. <br>Seit 2009 arbeite ich an der Frage, wie Monitoring nicht nur auf Infrastruktur-Ebene, sondern aus Nutzersicht.<br>Robotmk ist meine Antwort: eine Lösung, die Robot Framework-Tests direkt in Checkmk integriert, als wäre es von Anfang an dafür gebaut worden.<br><br>Und heute? Robotmk ist integraler Bestandteil von Checkmk. Und ich habe das Glück, in Teilzeit bei Checkmk als Produktmanager für meine eigene Erfindung zu arbeiten."
  badges:
    - 'Robot Framework <a href="https://www.robotframework.org/ambassadors/" target="_blank" rel="noopener noreferrer">Ambassador</a>'
    - 'Senior Product Manager Synthetic Monitoring @ <a href="https://www.checkmk.com" target="_blank" rel="noopener noreferrer">Checkmk</a>'
  cta: "Meine Geschichte →"
  img_alt: "Simon Meggle, Erfinder von Robotmk"

