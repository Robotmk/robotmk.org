poc:
  icon: "⚗️"
  meta: "Festpreis · Definierter Scope"
  title: "Proof of Concept"
  tagline: "Eine oder zwei geschäftskritische Anwendungen, vollständig in Checkmk integriert — inklusive Knowhow-Transfer. Sie erhalten ein lauffähiges Setup und eine fundierte Entscheidungsgrundlage."
  desc: "Ein schlankes und klar umrissenes Projekt mit festem Zeitrahmen und Festpreis.<br>Gemeinsam wählen wir ein bis zwei geschäftskritische Anwendungen aus, entwickeln dafür belastbare Robot-Framework-Tests und integrieren diese vollständig in Ihre Checkmk-Instanz – inklusive Knowhow-Transfer und Dokumentation.<br>Sie erhalten ein lauffähiges Setup und eine fundierte Entscheidungsgrundlage, ob ein breiter Rollout für Sie sinnvoll ist."
