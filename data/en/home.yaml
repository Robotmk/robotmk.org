# ── Founder ───────────────────────────────────────────────────────────────────
founder:
  heading: "Invented. Perfected. Native in Checkmk."
  bio: "I am <b>Simon Meggle</b>, the founder of the Robotmk project. <br>Since 2009, I have been exploring how monitoring works not just at the infrastructure level, but from the user's perspective. <br>Robotmk is my answer: a solution that integrates Robot Framework tests directly into Checkmk, as if it had been built for that purpose from the outset.<br><br>And today? Robotmk is an integral part of Checkmk. And I am lucky enough to work part-time at Checkmk as a product manager for my own invention."
  badges:
    - 'Robot Framework <a href="https://www.robotframework.org/ambassadors/" target="_blank" rel="noopener noreferrer">Ambassador</a>'
    - 'Senior Product Manager Synthetic Monitoring @ <a href="https://www.checkmk.com" target="_blank" rel="noopener noreferrer">Checkmk</a>'
  cta: "My Story →"
  img_alt: "Simon Meggle, Inventor of Robotmk"

