# ── Stats Bar ─────────────────────────────────────────────────────────────────
stats:
  heading: "The truth behind green dashboards:"
  source: 'Source: <a href="https://thenetworkinstallers.com/blog/cost-of-it-downtime-statistics/" target="_blank" rel="noopener noreferrer">The Network Installers — Cost of IT Downtime Statistics</a>'
  description: "Traditional monitoring watches what rarely fails: the hardware.<br>What it doesn't see is what your users actually experience — a failed login, an endlessly loading page, a checkout that hangs.<br><b>Fatal: user satisfaction and revenue are created exactly where monitoring systems are blind — at the application level.</b>"
  items:
    - number: "7"
      label: "of 10 IT failures: human-made."
    - number: "2.5×"
      label: "Cost increase from 2014–2024 (Gartner/EMA)"
    - number: "$14,000"
      label: "Average cost of one minute of IT downtime (2026)"

