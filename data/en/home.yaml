# ── Stats Bar ─────────────────────────────────────────────────────────────────
stats:
  heading: "The truth behind green dashboards:"
  source: 'Source: <a href="https://thenetworkinstallers.com/blog/cost-of-it-downtime-statistics/" target="_blank" rel="noopener noreferrer">The Network Installers — Cost of IT Downtime Statistics</a>'
  description: "Traditional monitoring watches what rarely fails: the hardware. What it doesn't see is what your users actually experience — a failed login, an endlessly loading page, a checkout that hangs. The very outages that happen most often and cost the most happen outside of its field of vision."
  items:
    - number: "7"
      label: "of 10 IT failures: human-made."
    - number: "2.5×"
      label: "Cost increase over 10 years (Gartner/EMA)"
    - number: "$14,000"
      label: "Average cost of one minute of IT downtime"

