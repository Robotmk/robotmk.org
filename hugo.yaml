baseURL: https://www.robotmk.org/
languageCode: en-us
enableEmoji: true
enableRobotsTXT: true

author:
  name: "Simon Meggle"
  avatar: "avatar.png"

markup:
  goldmark:
    renderer:
      unsafe: true  # Allows HTML in Markdown

defaultContentLanguage: en
defaultContentLanguageInSubdir: true
languages:
  en:
    languageCode: en-US
    title: Robotmk
    languageDirection: ltr
    languageName: English
    weight: 1
    params:
      description: Robotmk Homepage
    menu:
      main:
        - name: "Home"
          url: "/en/"
          weight: 1
        # - name: "Learn"
        #   url: "/en/learn/"
        #   weight: 2
        - name: "Robotmk Bridge ✨"
          url: "/en/bridge/"
          weight: 2
        - name: "Services"
          url: "/en/services/"
          weight: 3
        - name: "Blog"
          url: "/en/blog/"
          weight: 4
        # - name: "About"
        #   url: "/en/about/"
        #   weight: 5
  de:
    title: Robotmk
    languageCode: de-DE
    languageDirection: ltr
    languageName: Deutsch
    weight: 2
    params:
      description: Welcome to RobotMK. The most downloaded MKP extension for Checkmk.
    menu:
      main:
        - name: "Home"
          url: "/de/"
          weight: 1
        # - name: "Lernen"
        #   url: "/de/learn/"
        #   weight: 2
        - name: "Robotmk Bridge ✨"
          url: "/de/bridge/"
          weight: 2
        - name: "Services"
          url: "/de/services/"
          weight: 3
        - name: "Blog"
          url: "/de/blog/"
          weight: 4
        # - name: "Über mich"
        #   url: "/de/about/"
        #   weight: 5

### PARAMS

params:
  newsletter_webhook_url: "https://n8n.robotmk.org/webhook/newsletter-signup"
  # list sub pages which should appear in the nav menu
  menu_filter: ["/en/blog/robotmk-v2-quickstart/", "/de/blog/robotmk-v2-schnellstart/"]
  home_copyright: '© Copyright Robotmk 2024'
  copyright: ELABIT GmbH
  logo:
    image: rmk_crop_transp_w150.png
  # Checkmk green
  highlightColor: "#37d8ae" 
  mainSections: ["blog"]
  sidebar:
    home: "right"  
    list: "right"  
    single: "right"
    # Enable widgets in given order
    widgets: ["languages", "search", "recent", "categories", "taglist", "social"]
    avatar: "img/avatar.png"
  widgets: 
    social: 
      github: "elabit"
      email: "mail@robotmk.org"
  post_meta: ["author", "date", "categories"]
  toc: true
  # URLS
  url:
    privacy_policy: ""
  # Googlt Tag Manager 
  # gtm_id: GTM-P95BJXKK
  gtm_id: GTM-MZR6FLQ
  # COMMENTS
  giscus:
    commentable:
      page: true
      post: true
      docs: false
      project: false
      publication: true
      talk: false
    conf:
      repo: elabit/blog.robotmk.org
      repo_id: R_kgDOLwGo7g
      category: Announcements
      category_id: DIC_kwDOLwGo7s4CeyI5
      mapping: og:title
      # mapping: pathname
      strict: 1
      reactions_enabled: 0
      emit_metadata: 0
      input_position: top
      label: comment
      theme: dark
      lang: en
      data_loading: lazy
      crossorigin: anonymous