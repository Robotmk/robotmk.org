# Founder Section
- id: home_founder_heading
  translation: "Erfunden. Perfektioniert. Nativ in Checkmk."
- id: home_founder_bio
  translation: "Seit 2009 arbeite ich an der Frage, wie Monitoring wirklich funktioniert — nicht nur auf Infrastruktur-Ebene, sondern aus Nutzersicht. Robotmk ist meine Antwort: ein Plugin, das Robot Framework-Tests direkt in Checkmk integriert, als wäre es von Anfang an dafür gebaut worden. Heute ist Robotmk das meistgenutzte Synthetic Monitoring Plugin für Checkmk."
- id: home_founder_badge1
  translation: "🔧 Erfinder von Robotmk"
- id: home_founder_badge2
  translation: "📋 Product Manager Synthetic Monitoring @ Checkmk"
- id: home_founder_cta
