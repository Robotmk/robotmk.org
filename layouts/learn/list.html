{{ define "title" }}{{ .Title }} — {{ .Site.Title }}{{ end }}

{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <h1 class="page-hero__title">{{ .Title }}</h1>
    {{ with .Description }}<p class="page-hero__subtitle">{{ . }}</p>{{ end }}
  </div>
</section>

<section class="learn-lead-magnets">
  <div class="container">
    {{ partial "learn/lead-magnets.html" . }}
  </div>
</section>

<section class="learn-courses">
  <div class="container">
    {{ partial "learn/courses.html" . }}
  </div>
</section>
{{ end }}
